# SwiftLint Configuration for KozBon

excluded:
  - KozBon/Legacy

disabled_rules:
  - todo
  - blanket_disable_command

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - trailing_comma

line_length:
  warning: 140
  error: 200
  ignores_comments: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 8
  error: 10

identifier_name:
  min_length: 2
  excluded:
    - id
    - ip
    - r1
    - r2

force_unwrapping:
  severity: warning

trailing_comma:
  mandatory_comma: false
