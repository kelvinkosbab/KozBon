name: Native CI

# Build the app on every Apple platform that CI can host. The matrix
# has two rows today:
#
#   - iOS Simulator (iPhone 17 Pro)
#   - macOS — same workspace, same scheme. Catches AppKit-availability
#     and macOS-specific compile issues that the iOS build would miss.
#
# visionOS lives in `multiplatform-build.yml` (build-only there too).
#
# This workflow used to also run `xcodebuild test`, but every test in
# the project now lives in Swift Package targets (the `KozBon` app
# target has zero tests since `TopLevelDestinationTests` moved into the
# `AppCore` package). The package test suites run under `spm-tests.yml`
# via `swift test`. Running `xcodebuild test` against the app scheme
# now would just exercise a no-op test phase, so we drop it.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: 'platform=iOS Simulator,name=iPhone 17 Pro'
          - platform: macOS
            destination: 'platform=macOS'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          # Key on platform too — the resolved package graph can differ
          # between iOS and macOS (different conditional `.target`
          # platform filters), so a single shared key would invalidate
          # the cache on every cross-platform run.
          key: ${{ runner.os }}-spm-${{ matrix.platform }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ matrix.platform }}-

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies -workspace KozBon.xcworkspace -scheme KozBon

      - name: Build
        run: |
          xcodebuild build \
            -workspace KozBon.xcworkspace \
            -scheme KozBon \
            -destination '${{ matrix.destination }}' \
            -skipPackagePluginValidation \
            | xcpretty --color || exit "${PIPESTATUS[0]}"
