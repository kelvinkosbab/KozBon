name: Native CI

# Build and test the app on every Apple platform that can host the test
# bundle from CI. The matrix has two rows today:
#
#   - iOS Simulator (iPhone 17 Pro) — original surface, hosts the bulk
#     of the snapshot- and view-driven tests.
#   - macOS — same workspace, same scheme, runs the platform-agnostic
#     unit tests and catches macOS-specific compile issues that the
#     iOS build would miss (e.g. AppKit availability, NSWindow types).
#
# visionOS isn't on the matrix because the visionOS Simulator can't
# host XCTest in headless CI yet; that platform stays in
# `multiplatform-build.yml` (build-only).

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: 'platform=iOS Simulator,name=iPhone 17 Pro'
          - platform: macOS
            destination: 'platform=macOS'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          # Key on platform too — the resolved package graph can differ
          # between iOS and macOS (different conditional `.target`
          # platform filters), so a single shared key would invalidate
          # the cache on every cross-platform run.
          key: ${{ runner.os }}-spm-${{ matrix.platform }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ matrix.platform }}-

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies -workspace KozBon.xcworkspace -scheme KozBon

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -workspace KozBon.xcworkspace \
            -scheme KozBon \
            -destination '${{ matrix.destination }}' \
            -skipPackagePluginValidation \
            | xcpretty --color || exit "${PIPESTATUS[0]}"

      - name: Test
        run: |
          xcodebuild test-without-building \
            -workspace KozBon.xcworkspace \
            -scheme KozBon \
            -destination '${{ matrix.destination }}' \
            | xcpretty --color || exit "${PIPESTATUS[0]}"
