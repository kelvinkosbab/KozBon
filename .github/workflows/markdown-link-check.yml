name: Markdown Link Check

# KozBon's documentation grew a lot — README, CONTRIBUTING, CHANGELOG, four
# ADRs under docs/adr/, and the rules under .claude/rules/ all link out to
# Apple docs, Wikipedia, RFCs, and each other. Two ways links rot:
#
#   1. Internal links break when files move (e.g. an ADR is renamed).
#   2. External links 404 over time as Apple, GitHub, IANA, etc. shuffle
#      pages around.
#
# We split the check into two triggers so neither one is annoying:
#
#   - On PR, we only check the .md files that actually changed. Fast (most
#     PRs touch zero or one markdown file) and gives the contributor a
#     clear gate before merge.
#   - Nightly, we sweep every .md in the repo. This catches external
#     rot that happens between PRs without coupling that signal to any
#     individual contributor's diff.
#
# Tool: lycheeverse/lychee-action — Rust-based, much faster than the
# old gaurav-nelson/github-action-markdown-link-check, and it has
# first-class GitHub annotations support.

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-link-check.yml'
  schedule:
    # Daily at 09:00 UTC (~02:00 Pacific). Catches link rot without
    # blocking any human's workday.
    - cron: '0 9 * * *'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-diff:
    name: Check changed markdown
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # lychee compares the PR head to the merge base; we need the
          # full history (or at least back to the base) to compute the
          # diff.
          fetch-depth: 0

      - name: Find changed markdown files
        id: changed
        run: |
          set -euo pipefail
          # Compare PR head against the base branch — files added or
          # modified in this PR.
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed=$(git diff --name-only --diff-filter=AM \
            "origin/${{ github.base_ref }}" HEAD -- '*.md' | tr '\n' ' ')
          echo "files=${changed}" >> "$GITHUB_OUTPUT"
          if [ -z "${changed}" ]; then
            echo "No markdown files changed in this PR — skipping."
          else
            echo "Will check: ${changed}"
          fi

      - name: Run lychee
        if: steps.changed.outputs.files != ''
        uses: lycheeverse/lychee-action@v2
        with:
          # --no-progress quiets the live progress bar (illegible in CI logs);
          # --max-concurrency caps requests to be polite to Apple etc.
          args: >-
            --no-progress
            --max-concurrency 8
            --accept 200,206,429
            ${{ steps.changed.outputs.files }}
          fail: true

  full-sweep:
    name: Nightly full sweep
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            --accept 200,206,429
            './**/*.md'
          # Don't fail the workflow on broken links here — a flaky external
          # site overnight shouldn't page anyone. We open/update an issue
          # below so rot is visible without being noisy.
          fail: false
          format: markdown
          output: ./lychee-report.md

      - name: Create or update issue with broken-link report
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Broken links detected by nightly markdown sweep'
          content-filepath: ./lychee-report.md
          labels: |
            documentation
            link-rot
